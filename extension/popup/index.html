<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepurposeAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      width: 360px;
      min-height: 400px;
      background: #fafafa;
      color: #111827;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      background: white;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: #6366f1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-logo svg {
      width: 16px;
      height: 16px;
      color: white;
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .content {
      padding: 20px;
    }

    .status {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .status-info {
      background: #eef2ff;
      color: #4338ca;
    }

    .status-success {
      background: #ecfdf5;
      color: #065f46;
    }

    .status-error {
      background: #fef2f2;
      color: #991b1b;
    }

    .status-loading {
      background: #f3f4f6;
      color: #4b5563;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .format-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .format-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 8px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: #4b5563;
      transition: all 0.15s;
    }

    .format-btn:hover {
      border-color: #c7d2fe;
      background: #eef2ff;
    }

    .format-btn.active {
      border-color: #6366f1;
      background: #eef2ff;
      color: #4338ca;
    }

    .format-btn svg {
      width: 20px;
      height: 20px;
    }

    .generate-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .generate-btn:hover {
      background: #4f46e5;
    }

    .generate-btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }

    .output-area {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: white;
      font-size: 13px;
      line-height: 1.6;
      color: #374151;
      max-height: 250px;
      overflow-y: auto;
      white-space: pre-wrap;
      display: none;
    }

    .output-area.visible {
      display: block;
    }

    .copy-btn {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: white;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }

    .copy-btn.visible {
      display: block;
    }

    .copy-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .login-prompt {
      text-align: center;
      padding: 40px 20px;
    }

    .login-prompt p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .login-link {
      display: inline-block;
      padding: 10px 20px;
      background: #6366f1;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .cancel-btn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: white;
      font-size: 13px;
      font-weight: 600;
      color: #991b1b;
      cursor: pointer;
      transition: all 0.15s;
    }

    .cancel-btn:hover {
      background: #fef2f2;
      border-color: #fecaca;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <rect x="3" y="3" width="6" height="6" rx="1.5" opacity="0.6"/>
        <rect x="11" y="11" width="6" height="6" rx="1.5" opacity="0.6"/>
        <rect x="11" y="3" width="6" height="6" rx="1.5"/>
        <rect x="3" y="11" width="6" height="6" rx="1.5"/>
      </svg>
    </div>
    <span class="header-title">RepurposeAI</span>
  </div>

  <div class="content" id="main-content">
    <div class="status status-info" id="status">
      Repurpose this page into social content.
    </div>

    <div class="section-label">Output format</div>
    <div class="format-grid">
      <button class="format-btn active" data-format="linkedin_post">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M7 11v6M7 7v.01M11 11v6m0-3a3 3 0 0 1 6 0v3"/></svg>
        LinkedIn
      </button>
      <button class="format-btn" data-format="linkedin_carousel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 2v4M6 2v4M18 2v4"/></svg>
        Carousel
      </button>
      <button class="format-btn" data-format="twitter_thread">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
        X Thread
      </button>
    </div>

    <button class="generate-btn" id="generate-btn">
      Generate content
    </button>
    <button class="cancel-btn hidden" id="cancel-btn">
      Cancel
    </button>

    <div class="output-area" id="output"></div>
    <button class="copy-btn" id="copy-btn">Copy to clipboard</button>
  </div>

  <div class="login-prompt hidden" id="login-prompt">
    <p>Sign in to RepurposeAI to start generating content.</p>
    <a class="login-link" id="login-link" href="#" target="_blank">Sign in</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
